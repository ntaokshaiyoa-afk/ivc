name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changes:
    # format等のコミットで [skip ci] が付いているならCIを走らせない
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            build:
              - 'src/**'
              - 'public/**'
              - 'vite.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'

  build:
    needs: changes
    # push(main) でビルド不要なら job ごとスキップ（高速化）
    # PR は一旦常に回す（方針次第で変えてOK）
    if: needs.changes.outputs.build_required == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # pnpm が入った後に cache: pnpm
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # -----------------------------
      # pnpm migration check
      # -----------------------------
      - name: Detect pnpm migration
        id: pnpmcheck
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm_ready=true" >> $GITHUB_OUTPUT
          else
            echo "pnpm_ready=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # Auto migrate to pnpm
      # -----------------------------
      - name: Migrate to pnpm
        if: steps.pnpmcheck.outputs.pnpm_ready == 'false'
        shell: bash
        run: |
          npm install
          pnpm import
          pnpm install

      # -----------------------------
      # Commit pnpm migration
      # （lock だけ作って push したら、以後は次のrunに任せる方が無駄が少ない）
      # -----------------------------
      - name: Commit pnpm migration
        if: steps.pnpmcheck.outputs.pnpm_ready == 'false' && github.event_name == 'push'
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add pnpm-lock.yaml
          git commit -m "auto migrate to pnpm [skip ci]" || exit 0
          git push

      - name: Stop this run after migration commit
        if: steps.pnpmcheck.outputs.pnpm_ready == 'false' && github.event_name == 'push'
        shell: bash
        run: exit 0

      # -----------------------------
      # Install dependencies (faster)
      # -----------------------------
      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile --prefer-offline
        # --ignore-scripts も速いが、壊れるプロジェクトがあるので一旦外してます

      # -----------------------------
      # Lint / Typecheck
      # -----------------------------
      - run: pnpm run lint
      - run: pnpm run typecheck

      # -----------------------------
      # Build (only if required)
      # -----------------------------
      - name: Build
        if: needs.changes.outputs.build_required == 'true'
        run: pnpm run build

      # -----------------------------
      # Deploy (only on main push + build required)
      # -----------------------------
      - name: Setup Pages
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/deploy-pages@v5
