name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vite-${{ runner.os }}-

      # -----------------------------
      # Dependency install (smart)
      # -----------------------------
      - name: Install dependencies
        run: |
          if git diff --name-only HEAD~1 | grep -q "package.json"; then
            echo "Dependency change detected → npm install"
            npm install
          else
            echo "No dependency change → npm ci"
            npm ci
          fi

      # -----------------------------
      # Prettier
      # -----------------------------
      - name: Prettier (changed files only)
        run: |
          CHANGED=$(git diff --name-only HEAD~1 | grep -E '\.(js|ts|tsx|jsx|json|css|md)$' || true)
          if [ -n "$CHANGED" ]; then
            npx prettier --write $CHANGED
          fi

      # -----------------------------
      # Auto format commit
      # -----------------------------
      - name: Commit formatting
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          # workflow変更は除外
          git restore --staged .github/workflows || true

          # 変更があればcommit
          if ! git diff --cached --quiet; then
            git commit -m "auto format"
            git push
          else
            echo "No formatting changes"
          fi

      # -----------------------------
      # Lint
      # -----------------------------
      - name: ESLint
        run: npm run lint

      # -----------------------------
      # Type check
      # -----------------------------
      - name: TypeScript check
        run: npm run typecheck

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: npm run build

      # -----------------------------
      # Bundle size check
      # -----------------------------
      - name: Bundle size check
        run: |
          SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${SIZE}KB"

          if [ "$SIZE" -gt 15000 ]; then
            echo "Bundle too large!"
            exit 1
          fi

      # -----------------------------
      # Pages deploy (push only)
      # -----------------------------
      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        if: github.event_name == 'push'
        uses: actions/deploy-pages@v4
