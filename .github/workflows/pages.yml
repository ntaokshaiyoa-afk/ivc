name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            build:
              - 'src/**'
              - 'public/**'
              - 'vite.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'

  build:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      # pnpm が入った後に cache: pnpm を使う
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      # -----------------------------
      # pnpm migration check
      # -----------------------------
      - name: Detect pnpm migration
        id: pnpmcheck
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm_ready=true" >> $GITHUB_OUTPUT
          else
            echo "pnpm_ready=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # Auto migrate to pnpm
      # -----------------------------
      - name: Migrate to pnpm
        if: steps.pnpmcheck.outputs.pnpm_ready == 'false'
        shell: bash
        run: |
          npm install
          pnpm import
          pnpm install

      # -----------------------------
      # Commit pnpm migration
      # -----------------------------
      - name: Commit pnpm migration
        if: steps.pnpmcheck.outputs.pnpm_ready == 'false' && github.event_name == 'push'
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add pnpm-lock.yaml
          git commit -m "auto migrate to pnpm" || exit 0
          git push

      # pnpm store cache（setup-node cache と併用で効きやすく）
      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        shell: bash
        run: |
          # package.jsonが変わってないなら frozen を優先（失敗しにくい&速い）
          pnpm install --frozen-lockfile

      # -----------------------------
      # Lint / Typecheck
      # -----------------------------
      - run: pnpm run lint
      - run: pnpm run typecheck

      # -----------------------------
      # Build (only if required)
      # -----------------------------
      - name: Build
        if: needs.changes.outputs.build_required == 'true'
        run: pnpm run build

      # -----------------------------
      # Deploy (only on main push + build required)
      # -----------------------------
      - name: Setup Pages
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        if: github.event_name == 'push' && needs.changes.outputs.build_required == 'true'
        uses: actions/deploy-pages@v4
