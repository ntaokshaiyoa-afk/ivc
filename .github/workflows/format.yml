name: Format (Prettier)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 差分計算用

      # pnpm を先に入れる
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # pnpm が入った後に cache: pnpm（pnpm store を actions/setup-node が面倒見てくれる）
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$base" "$head" \
            | grep -E '\.(js|ts|tsx|jsx|json|css|md)$' \
            | grep -v '^node_modules/' || true)

          # 複数行をそのまま output に渡す
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 依存インストール無しで Prettier（高速）
      - name: Prettier (changed files only, no install)
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          # 必要ならバージョン固定（推奨）
          # プロジェクトのprettierプラグインが必要な場合は pnpm install に戻してください
          echo "${{ steps.changed.outputs.files }}" | xargs pnpm dlx prettier@3.5.3 --write

      - name: Commit formatting
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          # workflowは勝手に触らない保険
          git restore --staged .github/workflows || true

          if ! git diff --cached --quiet; then
            git commit -m "auto format [skip ci]"
            git push
          fi
